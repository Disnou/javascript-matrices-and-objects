<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <script>

    // Array simples de strings (nomes) | Simple array of strings (names)
    const nomes = [
        'Orion',
        'Maria',
        'José',
        'Antônio'
    ]

    // Array simples de números (idades) | Simple array of numbers (ages)
    const idades = [
        18,
        20,
        24,
        30,
        36
    ]

    // Matriz: Array bidimensional contendo listas de notas | Matrix: Two-dimensional array containing lists of grades
    const notas = [
        [5,10,9,4],
        [6,5,2,10],
        [8, 6,3,3]
    ]

    /*
    console.log(nomes[0])
    console.log(idades[3])
    console.table(notas)
    */                                                                                                                                                                                                                                                                                                                         

    // Objeto isolado representando uma entidade única | Isolated object representing a single entity
    const pessoa = {nome: 'Disnou', telefone: '(85) 1234-5678', endereço: 'ABC'}

    // Array de Objetos: Estrutura que simula uma tabela de banco de dados | Array of Objects: Structure simulating a database table
    const pessoas = [
        {nome: 'Disnou', telefone: '(85) 1234-5678', endereço: 'ABC'},
        {nome: 'Maria', telefone: '(85) 9876-5432', endereço: 'DEF'},
        {nome: 'José', telefone: '(85) 5555-5555', endereço: 'GHI'}
    ]

    // Acessando um índice específico dentro da matriz (Linha índice 2, Coluna índice 2)
    // Accessing a specific index inside the matrix (Row index 2, Column index 2)
    console.log(notas[2][2])

    // Acessando o terceiro objeto dentro da lista de pessoas (índice 2)
    // Accessing the third object inside the people list (index 2)
    console.log(pessoas[2])

</script>
</body>
